# Render static-site blueprint. Connect the repo on render.com and it picks
# this up automatically (or configure the same values manually).
services:
  - type: web
    name: tarkov-hideout-tracker
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    # SPA-style fallback so deep links / refreshes always serve the app.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
